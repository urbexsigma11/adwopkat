<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVANS LEGAL TERMINAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; margin: 0; }
        #out { border: 1px solid #222; height: 300px; overflow-y: scroll; padding: 5px; background: #050505; margin-bottom: 10px; font-size: 14px; }
        #in-row { display: flex; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; flex-grow: 1; padding: 10px; font-family: monospace; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .b { color: #fff; } /* Boss */
        .r { color: #0f0; } /* Richard */
        .s { color: #444; font-size: 10px; } /* System */
    </style>
</head>
<body onclick="initAudio()">

<div id="out">
    <div class="s">[SYSTEM] READY. KLIKNIJ EKRAN, BY WŁĄCZYĆ GŁOS.</div>
    <div class="r">Richard: Standing by. State your request, Boss.</div>
</div>

<div id="in-row">
    <input type="text" id="cmd" placeholder="ROZKAZ..." onkeypress="if(event.keyCode==13) run()">
    <button onclick="run()">SEND</button>
</div>

<script>
    var out = document.getElementById('out');
    var input = document.getElementById('cmd');
    var audioReady = false;

    // Odblokowanie audio dla starych i nowych systemów
    function initAudio() {
        if(!audioReady) {
            say("System online");
            audioReady = true;
            print("System: Audio enabled.", "s");
        }
    }

    function say(txt) {
        if ('speechSynthesis' in window) {
            var m = new SpeechSynthesisUtterance(txt);
            m.lang = 'en-US';
            m.rate = 0.9;
            window.speechSynthesis.speak(m);
        }
    }

    function print(txt, cls) {
        var d = document.createElement('div');
        d.className = cls;
        d.innerHTML = txt;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    function run() {
        var v = input.value.trim();
        if(!v) return;

        print("> " + v, "b");
        
        var resp = "";
        var t = v.toLowerCase();

        // LOGIKA SUPER PAPUGI (Art. KK)
        if(t.indexOf("pranie") > -1 || t.indexOf("mamon") > -1) {
            resp = "Art. 299 KK. Money Laundering. Penalty: 6 months to 8 years. Group/Large scale: 1 to 10 years. Assets forfeiture included.";
        } else if(t.indexOf("rozboj") > -1 || t.indexOf("napad") > -1) {
            resp = "Art. 280 KK. Robbery. Standard: 2-15 years. With weapon: 3-20 years. High risk.";
        } else if(t.indexOf("oszust") > -1 || t.indexOf("walek") > -1) {
            resp = "Art. 286 KK. Fraud. Penalty: 6 months to 8 years. Intent is key.";
        } else if(t.indexOf("towar") > -1 || t.indexOf("narko") > -1) {
            resp = "Art. 62 Drug Law. Possession: up to 3y. Large amount: 1-10y. Selling: 2-12y.";
        } else {
            resp = "Request received. Processing data. Stay responsible.";
        }

        setTimeout(function() {
            print("Richard: " + resp, "r");
            say(resp);
        }, 500);

        input.value = "";
    }
</script>

</body>
</html>
