<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RICHARD B. EVANS // PURE TERMINAL</title>
    <style>
        :root { --green: #00ff41; --bg: #000; --low-green: rgba(0, 255, 65, 0.2); }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        #header { font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; letter-spacing: 1px; }
        #console { flex-grow: 1; overflow-y: auto; border: 1px solid #111; padding: 20px; background: #020202; margin-bottom: 20px; box-shadow: inset 0 0 20px var(--low-green); }
        
        .input-box { display: flex; gap: 10px; background: #0a0a0a; padding: 15px; border: 1px solid var(--green); }
        input { flex-grow: 1; background: transparent; border: none; color: var(--green); font-family: inherit; font-size: 18px; outline: none; }
        
        .btn { background: var(--green); color: #000; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-family: inherit; }
        .btn:hover { background: #fff; }
        .btn-mic { background: #ff0000; color: #fff; }

        .line { margin-bottom: 12px; line-height: 1.5; }
        .boss-line { color: #fff; }
        .richard-line { color: var(--green); text-shadow: 0 0 5px var(--green); }
        .sys-line { color: #444; font-size: 12px; font-style: italic; }
        
        /* Animacja pisania */
        .typing::after { content: "_"; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="header">
    <span>SYSTEM: RICHARD_B_EVANS // 2083 KOOTER LN, NC</span>
    <span>ENCRYPTED_SESSION: ACTIVE</span>
</div>

<div id="console">
    <div class="line sys-line">[SYS] Czekam na inicjalizację głosu... Kliknij przycisk po prawej.</div>
</div>

<div class="input-box">
    <input type="text" id="cmdInput" placeholder="WPISZ ROZKAZ LUB UŻYJ MIC..." autocomplete="off">
    <button class="btn btn-mic" onclick="runMic()" id="micBtn">🎙️ MIC</button>
    <button class="btn" onclick="sendToRichard()">WYŚLIJ</button>
    <button class="btn" style="background: #333; color: #00ff41;" onclick="startSystem()">INICJUJ</button>
</div>

<script>
    const consoleDiv = document.getElementById('console');
    const inputField = document.getElementById('cmdInput');
    const micBtn = document.getElementById('micBtn');

    // 1. RICHARD MÓWI I PISZE
    function richardResponse(text) {
        // Tekst na ekranie
        const line = document.createElement('div');
        line.className = "line richard-line typing";
        line.innerText = "Richard: ";
        consoleDiv.appendChild(line);
        
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                line.innerText += text.charAt(i);
                i++;
                setTimeout(typeWriter, 30);
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            } else {
                line.classList.remove('typing');
            }
        }
        typeWriter();

        // Głos (TTS)
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; // Richard mówi z akcentem USA
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }
    }

    // 2. TWOJA KOMENDA (Tekst)
    function sendToRichard() {
        const cmd = inputField.value.trim();
        if (!cmd) return;

        const line = document.createElement('div');
        line.className = "line boss-line";
        line.innerText = "> " + cmd;
        consoleDiv.appendChild(line);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;

        // Reakcje Papugi
        setTimeout(() => {
            if (cmd.toLowerCase().includes("sprawdź")) {
                richardResponse("Accessing legal mainframe. Cross-referencing DOX files and local warrants for you, Boss.");
            } else if (cmd.toLowerCase().includes("kto to")) {
                richardResponse("Checking target identity. Analyzing database. Please wait for the scan result.");
            } else {
                richardResponse("Message received. I'm processing the data. Stay low.");
            }
        }, 600);

        inputField.value = "";
    }

    // 3. TWOJA KOMENDA (Głos)
    function runMic() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return alert("Brak wsparcia MIC w tej przeglądarce.");
        
        const rec = new SpeechRec();
        rec.lang = 'pl-PL'; // Ty po polsku
        rec.start();
        micBtn.style.background = "#00ff41";

        rec.onresult = (e) => {
            inputField.value = e.results[0][0].transcript;
            sendToRichard();
        };

        rec.onend = () => { micBtn.style.background = "#ff0000"; };
    }

    function startSystem() {
        richardResponse("Richard B. Evans online. Operational terminal secured. Awaiting your orders, Boss.");
    }

    inputField.addEventListener("keypress", (e) => { if(e.key === "Enter") sendToRichard(); });
</script>

</body>
</html>
